[tool.ruff]
target-version = "py311"
line-length = 120
exclude = ["TOOLS/ad-hoc/**", "TOOLS/android/**"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "S"]

[tool.ruff.lint.per-file-ignores]
"TOOLS/captcha_bypass.py" = ["S311", "S110", "S112"]
"TOOLS/scrapling_fetch.py" = ["S110", "S112"]
"TOOLS/db_query.py" = ["S608"]
"TOOLS/migrate_old_db.py" = ["S608", "S603"]
"TOOLS/fofa_relay.py" = ["S501"]
"TOOLS/waf_rotate.py" = ["S105", "S311", "S501"]
"TOOLS/db_backup.py" = ["S603", "S607"]
"TOOLS/session_dash.py" = ["S608"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
exclude = ["TOOLS/ad-hoc/", "TOOLS/android/"]
