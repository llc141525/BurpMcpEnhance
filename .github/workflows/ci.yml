name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run tests
        run: ./gradlew test

      - name: Build distributable JAR
        run: ./gradlew embedProxyJar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: burp-mcp-all
          path: build/libs/burp-mcp-all.jar
          if-no-files-found: error
          retention-days: 14
